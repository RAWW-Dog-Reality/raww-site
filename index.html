<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAWW</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        @font-face {
            font-family: 'Sophistik';
            src: url('./assets/fonts/Sophistik Sans.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Montech';
            src: url('./assets/fonts/MONTECHV02-ExtraLightItalic.woff2') format('woff2');
            font-weight: 200;
            font-style: italic;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #09b5a3 0%, #0f87cc 55%, #1565c0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* let content stack from top; justify with padding */
            justify-content: center;
        }

        /* ── Models fill remaining space ── */
        .hero {
            width: 100%;
            max-width: 860px;
            flex: 1;
            min-height: 0;
            display: flex;
        }

        .models-row {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 0;
        }

        .model-wrap {
            flex: 1;
            height: 100%;
            position: relative;
        }

        .float-a {
            animation: floatA 2.4s ease-in-out infinite;
        }
        .float-b {
            animation: floatA 2.6s ease-in-out 0.35s infinite;
        }

        @keyframes floatA {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-14px); }
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: transparent;
            --progress-bar-color: transparent;
            --progress-mask: transparent;
        }

        /* ── Text block: pulled up into the empty bottom of the model area ── */
        .text-block {
            margin-top: -3vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            pointer-events: none;
            user-select: none;
            flex-shrink: 0;
        }

        /* ── Tall / portrait screen: models fill less height, pull text up more ── */
        @media (orientation: portrait) {
            .hero { max-height: 55vh; }
            .text-block { margin-top: -12vh; }
        }

        /* ── Wide / landscape screen: less vertical room, reduce overlap ── */
        @media (orientation: landscape) {
            .hero { max-height: 50vh; }
            .text-block { margin-top: -2vh; }
            .reality-text { font-size: clamp(36px, 6.5vw, 80px); }
            .tagline-text  { font-size: clamp(14px, 2.4vw, 30px); }
            .qr-wrapper    { margin-top: 1.5vh; margin-bottom: 1.5vh; }
            .qr-wrapper img { width: clamp(120px, 18vmin, 220px); height: clamp(120px, 18vmin, 220px); }
        }

        .reality-text {
            font-family: 'Sophistik', sans-serif;
            font-size: clamp(48px, 8.5vw, 110px);
            color: #6065A3;
            letter-spacing: 0.14em;
            line-height: 1;
            text-shadow:
                1px 1px 0 #4a4e82,
                2px 2px 0 #3e4272,
                3px 3px 0 #333761,
                5px 7px 14px rgba(10, 10, 40, 0.5);
        }

        .tagline-text {
            font-family: 'Montech', sans-serif;
            font-size: clamp(20px, 3.2vw, 42px);
            font-style: italic;
            color: #C0DBB8;
            letter-spacing: 0.22em;
            line-height: 1;
        }

        /* ── QR code box ── */
        .qr-wrapper {
            margin-top: 3vh;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.88);
            padding: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3vh;
        }

        .qr-wrapper img {
            width: clamp(200px, 28vmin, 340px);
            height: clamp(200px, 28vmin, 340px);
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="models-row">
            <!-- Loin chop -->
            <div class="model-wrap float-a">
                <model-viewer
                    src="./assets/loinchop.glb"
                    orientation="-29deg 0deg -86deg"
                    camera-orbit="0deg 70deg auto"
                    min-camera-orbit="-80deg 45deg auto"
                    max-camera-orbit="80deg 100deg auto"
                    camera-controls
                    disable-zoom
                    disable-pan
                    interaction-prompt="none"
                    shadow-intensity="0.4"
                    exposure="0.75"
                ></model-viewer>
            </div>

            <!-- Randy (chihuahua) -->
            <div class="model-wrap float-b" style="flex: 1.1;">
                <model-viewer
                    src="./assets/randy.glb"
                    camera-orbit="5deg 78deg auto"
                    min-camera-orbit="-80deg 45deg auto"
                    max-camera-orbit="80deg 130deg auto"
                    camera-controls
                    disable-zoom
                    disable-pan
                    interaction-prompt="none"
                    shadow-intensity="0.4"
                    exposure="0.75"
                ></model-viewer>
            </div>
        </div>
    </div>

    <div class="text-block">
        <div class="reality-text">REALITY</div>
        <div class="tagline-text">CHANGE THE GAME.</div>
    </div>

    <div class="qr-wrapper">
        <img src="./assets/qr.png" alt="QR code">
    </div>

    <script>
        // Eggplant cursor — rotated 135° so the round (non-stem) end is the pointer tip
        (function () {
            const size = 64;
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            ctx.translate(size / 2, size / 2);
            ctx.rotate(Math.PI); // 180° clockwise → round end → upper-left
            ctx.font = '44px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🍆', 0, 2);
            const url = c.toDataURL();
            const rule = `url(${url}) 10 10, auto`;
            document.documentElement.style.cursor = rule;

            // Inject into each model-viewer shadow root so it overrides internal cursors
            document.querySelectorAll('model-viewer').forEach(mv => {
                mv.style.cursor = rule;
                const inject = () => {
                    if (!mv.shadowRoot) return;
                    const style = document.createElement('style');
                    style.textContent = `* { cursor: url(${url}) 10 10, auto !important; }`;
                    mv.shadowRoot.appendChild(style);
                };
                // Shadow root may not exist until the element upgrades
                if (mv.shadowRoot) {
                    inject();
                } else {
                    customElements.whenDefined('model-viewer').then(inject);
                }
            });
        })();

        document.querySelectorAll('model-viewer').forEach(mv => {
            const initialOrbit = mv.getAttribute('camera-orbit');
            let resetTimer = null;

            mv.addEventListener('camera-change', (e) => {
                if (e.detail.source === 'user-interaction') {
                    clearTimeout(resetTimer);
                    resetTimer = setTimeout(() => {
                        mv.cameraOrbit = initialOrbit;
                    }, 2000);
                }
            });
        });
    </script>
</body>
</html>
